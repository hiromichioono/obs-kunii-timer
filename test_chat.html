<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>チャットテストパネル</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #1a1a1a; color: #eee; max-width: 480px; margin: 0 auto; }
    h2 { margin-bottom: 4px; font-size: 16px; color: #aaa; }
    h1 { margin: 0 0 24px; font-size: 22px; }
    section { margin-bottom: 28px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    button {
      padding: 10px 16px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: bold;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-comment  { background: #3b82f6; color: #fff; }
    .btn-rapid    { background: #f59e0b; color: #000; }
    .btn-sc-200  { background: #00BCD4; color: #000; }
    .btn-sc-500  { background: #1DE9B6; color: #000; }
    .btn-sc-1k   { background: #FFCA28; color: #000; }
    .btn-sc-2k   { background: #F57C00; color: #fff; }
    .btn-sc-5k   { background: #E91E63; color: #fff; }
    .btn-sc-50k  { background: #E53935; color: #fff; }
    textarea {
      width: 100%; box-sizing: border-box;
      background: #2a2a2a; color: #eee; border: 1px solid #444;
      border-radius: 6px; padding: 8px; font-size: 13px; resize: vertical;
      margin-top: 6px;
    }
    #status {
      display: inline-block; padding: 4px 10px; border-radius: 4px;
      font-size: 12px; font-weight: bold; margin-bottom: 20px;
    }
    .st-ok  { background: #22c55e; color: #000; }
    .st-ng  { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <h1>チャットテストパネル</h1>
  <div id="status" class="st-ng">OFFLINE</div>

  <section>
    <h2>コメント</h2>
    <textarea id="comment-text" rows="2" placeholder="テキストを入力（空欄でデフォルト）"></textarea>
    <div class="row">
      <button class="btn-comment" onclick="sendComment()">コメント送信</button>
      <button class="btn-rapid"   onclick="sendRapid()">連投テスト（10件）</button>
    </div>
  </section>

  <section>
    <h2>スーパーチャット</h2>
    <textarea id="sc-text" rows="2" placeholder="メッセージを入力（空欄でデフォルト）"></textarea>
    <div class="row">
      <button class="btn-sc-200"  onclick="sendSC(200)">¥200</button>
      <button class="btn-sc-500"  onclick="sendSC(500)">¥500</button>
      <button class="btn-sc-1k"   onclick="sendSC(1000)">¥1,000</button>
      <button class="btn-sc-2k"   onclick="sendSC(2000)">¥2,000</button>
      <button class="btn-sc-5k"   onclick="sendSC(5000)">¥5,000</button>
      <button class="btn-sc-50k"  onclick="sendSC(50000)">¥50,000</button>
    </div>
  </section>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;
    const statusEl = document.getElementById("status");
    let ws = null;

    function setButtons(enabled) {
      document.querySelectorAll("button").forEach(b => b.disabled = !enabled);
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen  = () => { statusEl.textContent = "CONNECTED"; statusEl.className = "st-ok";  setButtons(true); };
      ws.onclose = () => { statusEl.textContent = "OFFLINE";   statusEl.className = "st-ng"; setButtons(false); setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }

    function send(data) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
    }

    function sendComment() {
      const msg = document.getElementById("comment-text").value.trim();
      send({ type: "cmd", action: "test_comment", ...(msg && { message: msg }) });
    }

    function sendSC(amount) {
      const msg = document.getElementById("sc-text").value.trim();
      send({ type: "cmd", action: "test_superchat", amount, ...(msg && { message: msg }) });
    }

    function sendRapid() {
      for (let i = 1; i <= 10; i++) {
        setTimeout(() => send({ type: "cmd", action: "test_comment", message: `連投テスト ${i}件目` }), i * 200);
      }
    }

    connect();
  </script>
</body>
</html>
