<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:    #e91e83;
      --navy:    #002366;
      --green:   #4ade80;
      --bg:      #f0f4ff;
      --surface: #e2eaff;
      --border:  #b8c8e8;
    }

    body {
      background: var(--bg);
      color: #111827;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 0.2em;
      color: var(--pink);
      text-transform: uppercase;
    }

    /* 現在時刻表示 */
    #display {
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: var(--navy);
    }

    #state-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: #888;
    }

    /* ボタン共通 */
    button {
      padding: 14px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #111827;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { opacity: 0.75; }

    /* 前半/後半 */
    #half-controls {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn-half { flex: 1; border-color: var(--navy); color: #8899cc; }
    .btn-half.active { background: var(--navy); color: #fff; }

    /* メインコントロール */
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      width: 100%;
    }

    #btn-start {
      flex: 1 1 100%;
      border-color: var(--green);
      color: var(--green);
    }
    #btn-start:active { background: color-mix(in srgb, var(--green) 15%, transparent); }

    #btn-stop {
      flex: 1;
      border-color: var(--pink);
      color: var(--pink);
    }
    #btn-stop:active { background: color-mix(in srgb, var(--pink) 15%, transparent); }

    #btn-reset {
      flex: 1;
      border-color: var(--navy);
      color: #8899cc;
    }

    /* スコア */
    #score-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 100%;
    }

    #teams-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #teams-row input {
      flex: 1;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #111827;
      font-size: 16px;
    }

    #teams-row span { font-size: 14px; color: #556; }

    #btn-set-teams {
      width: 100%;
      padding: 10px 14px;
      border-color: var(--navy);
      color: #8899cc;
      font-size: 15px;
    }

    #goals-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .goal-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .goal-ctrl span {
      font-size: 32px;
      font-weight: bold;
      color: var(--navy);
      min-width: 32px;
      text-align: center;
    }

    #score-sep {
      font-size: 32px;
      font-weight: bold;
      color: #556;
    }

    .btn-goal-plus, .btn-goal-minus {
      width: 48px;
      height: 48px;
      font-size: 24px;
      padding: 0;
      border-radius: 8px;
    }

    .btn-goal-plus  { border-color: var(--green); color: var(--green); }
    .btn-goal-minus { border-color: var(--pink);  color: var(--pink); }

    /* 時刻同期 */
    #sync-area {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 100%;
    }

    #sync-area label { font-size: 14px; color: #556; }

    #sync-area input {
      width: 60px;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #111827;
      font-size: 16px;
      text-align: center;
    }

    #btn-sync {
      flex: 1;
      padding: 10px 14px;
      border-color: var(--navy);
      color: #8899cc;
      font-size: 15px;
    }

    /* YouTube チャット開始 */
    #chat-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 100%;
    }

    #btn-get-streams {
      width: 100%;
      padding: 12px 14px;
      border-color: var(--green);
      color: var(--green);
    }

    #stream-list { display: flex; flex-direction: column; gap: 6px; width: 100%; }

    .stream-btn {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: #111827;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
    }

    .badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      font-weight: bold;
    }
    .badge-live     { background: color-mix(in srgb, var(--green) 20%, transparent); color: #16a34a; }
    .badge-upcoming { background: color-mix(in srgb, var(--navy) 15%, transparent);  color: var(--navy); }

    /* 接続状態 */
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .disconnected { background: var(--pink);  box-shadow: 0 0 6px var(--pink); }
    .label-on  { color: var(--green); }
    .label-off { color: var(--pink); }
  </style>
</head>
<body>
  <h1>Timer Control</h1>

  <div id="display">00:00</div>
  <div id="state-label">STOPPED</div>

  <div id="half-controls">
    <button class="btn-half active" data-half="前半">前半</button>
    <button class="btn-half"        data-half="後半">後半</button>
  </div>

  <div id="controls">
    <button id="btn-start">キックオフ / 再開</button>
    <button id="btn-stop">一時停止</button>
    <button id="btn-reset">リセット</button>
  </div>

  <div id="sync-area">
    <label>同期:</label>
    <input id="sync-min" type="number" min="0" max="120" value="0" inputmode="numeric" />
    <label>分</label>
    <input id="sync-sec" type="number" min="0" max="59" value="0" inputmode="numeric" />
    <label>秒</label>
    <button id="btn-sync">時刻を同期</button>
  </div>

  <div id="score-area">
    <div id="teams-row">
      <input id="input-home" type="text" placeholder="ホーム" />
      <span>vs</span>
      <input id="input-away" type="text" placeholder="アウェイ" />
    </div>
    <button id="btn-set-teams">セット</button>
    <div id="goals-row">
      <div class="goal-ctrl">
        <button class="btn-goal-plus" data-team="home">+</button>
        <span id="disp-home-goals">0</span>
        <button class="btn-goal-minus" data-team="home">−</button>
      </div>
      <div id="score-sep">-</div>
      <div class="goal-ctrl">
        <button class="btn-goal-plus" data-team="away">+</button>
        <span id="disp-away-goals">0</span>
        <button class="btn-goal-minus" data-team="away">−</button>
      </div>
    </div>
  </div>

  <div id="chat-area">
    <button id="btn-get-streams">配信一覧を取得</button>
    <div id="stream-list"></div>
  </div>

  <div id="status">
    <div id="status-dot" class="disconnected"></div>
    <span id="status-label" class="label-off">OFFLINE</span>
  </div>

  <script>
    // ローカルファイルで開く場合は localhost、HTTP 配信経由（iPhone 等）はアクセス元ホストを使用
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const displayEl    = document.getElementById("display");
    const stateLabelEl = document.getElementById("state-label");
    const statusDot    = document.getElementById("status-dot");
    const statusLabel  = document.getElementById("status-label");
    const chatAreaEl   = document.getElementById("chat-area");

    let ws             = null;
    let reconnectTimer = null;

    function pad(n) { return String(n).padStart(2, "0"); }

    function renderTimer(seconds, active) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      displayEl.textContent = `${pad(m)}:${pad(s)}`;
      stateLabelEl.textContent = active ? "LIVE" : "STOPPED";
      stateLabelEl.style.color = active ? "var(--green)" : "#556";
    }

    function setStatus(online) {
      statusDot.className   = online ? "connected"  : "disconnected";
      statusLabel.className = online ? "label-on"   : "label-off";
      statusLabel.textContent = online ? "CONNECTED" : "OFFLINE";
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true);
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === "timer") {
            renderTimer(data.seconds, data.active);
            chatAreaEl.style.display = data.chat ? "none" : "flex";
            if (data.half) updateHalfButtons(data.half);
            if (data.home !== undefined) {
              document.getElementById("disp-home-goals").textContent = data.home_goals;
              document.getElementById("disp-away-goals").textContent = data.away_goals;
            }
          } else if (data.type === "streams") {
            const list = document.getElementById("stream-list");
            list.innerHTML = "";
            if (data.items.length === 0) {
              list.textContent = "配信が見つかりません";
              return;
            }
            data.items.forEach((s) => {
              const btn = document.createElement("button");
              btn.className = "stream-btn";
              const badge = document.createElement("span");
              badge.className = `badge ${s.live ? "badge-live" : "badge-upcoming"}`;
              badge.textContent = s.live ? "LIVE" : "予約済み";
              btn.appendChild(badge);
              btn.appendChild(document.createTextNode(s.title));
              btn.onclick = () => send({ type: "cmd", action: "start_chat", video_id: s.video_id });
              list.appendChild(btn);
            });
          }
        } catch (_) {}
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    function updateHalfButtons(half) {
      document.querySelectorAll(".btn-half").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.half === half);
      });
    }

    document.querySelectorAll(".btn-half").forEach(btn => {
      btn.onclick = () => send({ type: "cmd", action: "set_half", half: btn.dataset.half });
    });

    document.getElementById("btn-set-teams").onclick = () => {
      send({ type: "cmd", action: "set_teams",
        home: document.getElementById("input-home").value.trim(),
        away: document.getElementById("input-away").value.trim(),
      });
    };

    document.querySelectorAll(".btn-goal-plus").forEach(btn => {
      btn.onclick = () => send({ type: "cmd", action: "goal", team: btn.dataset.team });
    });

    document.querySelectorAll(".btn-goal-minus").forEach(btn => {
      btn.onclick = () => send({ type: "cmd", action: "undo_goal", team: btn.dataset.team });
    });

    document.getElementById("btn-get-streams").onclick = () => send({ type: "cmd", action: "get_streams" });

    document.getElementById("btn-start").onclick = () => send({ type: "cmd", action: "start" });
    document.getElementById("btn-stop").onclick  = () => send({ type: "cmd", action: "stop" });
    document.getElementById("btn-reset").onclick = () => send({ type: "cmd", action: "reset" });
    document.getElementById("btn-sync").onclick  = () => {
      const min = parseInt(document.getElementById("sync-min").value, 10) || 0;
      const sec = parseInt(document.getElementById("sync-sec").value, 10) || 0;
      send({ type: "cmd", action: "sync", seconds: min * 60 + sec });
    };

    connect();
  </script>
</body>
</html>
