<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Timer Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #002366;
      --color-off: #e91e83;
      --font-sm: 11px;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 16px;
      pointer-events: none;
      user-select: none;
    }

    #timer-card {
      position: absolute;
      top: 0;
      left: 0;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      background: transparent;
    }

    #time-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #half-label {
      font-size: 52px;
      font-weight: bold;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 20px color-mix(in srgb, var(--accent) 60%, transparent);
      line-height: 1;
    }

    #time {
      font-size: 120px;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-shadow: 0 0 20px color-mix(in srgb, var(--accent) 60%, transparent);
      line-height: 1;
    }

    #top-row {
      position: relative;
      width: 100%;
    }

    #score-section {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 11px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 52px;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 20px color-mix(in srgb, var(--accent) 60%, transparent);
      line-height: 1;
      max-width: calc(100% - 32px);
    }

    #home-name, #away-name {
      font-size: 40px;
      max-width: 7em;
      min-width: 0;
    }

    #score-nums { font-size: 120px; }

    #timer-status {
      position: absolute;
      top: -20px;
      right: 0;
      z-index: 1;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 0.2em;
    }

    #timer-status.live  { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
    #timer-status.break { color: var(--color-off); text-shadow: 0 0 8px color-mix(in srgb, var(--color-off) 60%, transparent); }
    #timer-status.empty { color: transparent; }

    /* 接続ステータス */
    #status {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #status-label { font-size: var(--font-sm); line-height: 1; }

    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: var(--color-off); box-shadow: 0 0 6px var(--color-off); }
    .label-on  { color: #22c55e; }
    .label-off { color: var(--color-off); }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-row">
      <div id="timer-card">
        <div id="status">
          <div id="status-dot" class="disconnected"></div>
          <span id="status-label" class="label-off">OFFLINE</span>
        </div>
        <div id="time-row">
          <div id="half-label">前半</div>
          <div id="time">00:00</div>
        </div>
        <div id="timer-status" class="empty">BREAK</div>
      </div>
      <div id="score-section" hidden>
        <span id="home-name"></span>
        <span id="score-nums"><span id="home-goals">0</span> - <span id="away-goals">0</span></span>
        <span id="away-name"></span>
      </div>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const timeEl         = document.getElementById("time");
    const halfLabelEl    = document.getElementById("half-label");
    const timerStatusEl  = document.getElementById("timer-status");
    const statusDot      = document.getElementById("status-dot");
    const statusLabel    = document.getElementById("status-label");
    const scoreSectionEl = document.getElementById("score-section");
    const homeNameEl     = document.getElementById("home-name");
    const awayNameEl     = document.getElementById("away-name");
    const homeGoalsEl    = document.getElementById("home-goals");
    const awayGoalsEl    = document.getElementById("away-goals");

    let timerActive    = false;
    let totalSeconds   = 0;
    let blinkState     = true;
    let blinkInterval  = null;
    let reconnectTimer = null;

    function pad(n) { return String(n).padStart(2, "0"); }

    function renderTime() {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      timeEl.textContent = `${pad(m)}:${pad(s)}`;
    }

    function renderStatus() {
      if (timerActive) {
        timerStatusEl.className = "live";
        timerStatusEl.textContent = "LIVE";
      } else {
        timerStatusEl.className = blinkState ? "break" : "empty";
        timerStatusEl.textContent = "BREAK";
      }
    }

    function startBlink() {
      if (blinkInterval) return;
      blinkInterval = setInterval(() => {
        blinkState = !blinkState;
        if (!timerActive) renderStatus();
      }, 1000);
    }

    function setStatus(online) {
      statusDot.className   = online ? "connected"  : "disconnected";
      statusLabel.className = online ? "label-on"   : "label-off";
      statusLabel.textContent = online ? "CONNECTED" : "OFFLINE";
    }

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true);
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type !== "timer") return;
          totalSeconds = data.seconds;
          timerActive  = data.active;
          if (data.half) halfLabelEl.textContent = data.half;
          if (data.home !== undefined) {
            homeNameEl.textContent  = data.home;
            awayNameEl.textContent  = data.away;
            homeGoalsEl.textContent = data.home_goals;
            awayGoalsEl.textContent = data.away_goals;
            scoreSectionEl.hidden   = !data.home && !data.away;
          }
          renderTime();
          renderStatus();
        } catch (_) {}
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    startBlink();
    connect();
  </script>
</body>
</html>
