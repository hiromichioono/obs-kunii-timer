<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Chat Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #002366;
      --color-off: #e91e83;
      --font-sm: 11px;
      --font-md: 24px;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
      pointer-events: none;
      user-select: none;
    }

    /* チャットエリア（右下） */
    #chat-area {
      align-self: flex-end;
      width: 480px;
      display: flex;
      flex-direction: column;
      background: rgba(30, 30, 30, 0.5);
      border-radius: 12px;
      padding: 8px;
    }

    /* メッセージカード */
    .message {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: var(--font-md);
      background: transparent;
      animation: slideIn 0.35s ease-out forwards;
    }

    .author {
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--accent);
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    .text {
      color: #ffffff;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    /* 接続ステータス */
    #status {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #status-label {
      font-size: var(--font-sm);
    }

    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: var(--color-off); box-shadow: 0 0 6px var(--color-off); }
    .label-on  { color: #22c55e; }
    .label-off { color: var(--color-off); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat-area">
      <div id="messages"></div>
      <div id="status">
        <div id="status-dot" class="disconnected"></div>
        <span id="status-label" class="label-off">OFFLINE</span>
      </div>
    </div>
  </div>

  <script>
    const WS_URL      = "ws://localhost:8765";
    const MAX_MESSAGES = 6;

    const messagesEl   = document.getElementById("messages");
    const statusDot    = document.getElementById("status-dot");
    const statusLabel  = document.getElementById("status-label");

    let reconnectTimer = null;

    function setStatus(online, chatOn = false) {
      if (!online) {
        statusDot.className   = "disconnected";
        statusLabel.className = "label-off";
        statusLabel.textContent = "OFFLINE";
      } else if (!chatOn) {
        statusDot.className   = "disconnected";
        statusLabel.className = "label-off";
        statusLabel.textContent = "CHAT OFF";
      } else {
        statusDot.className   = "connected";
        statusLabel.className = "label-on";
        statusLabel.textContent = "CONNECTED";
      }
    }

    function addMessage(author, text) {
      const card = document.createElement("div");
      card.className = "message";
      card.innerHTML =
        `<span class="author">${escapeHtml(author)}</span>` +
        `<span class="text">${escapeHtml(text)}</span>`;
      messagesEl.appendChild(card);

      // 最大件数を超えたら古いものを削除
      if (messagesEl.children.length > MAX_MESSAGES) {
        messagesEl.removeChild(messagesEl.firstChild);
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === "timer") setStatus(true, data.chat);
          if (data.author) addMessage(data.author, data.message);
        } catch (_) {}
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
