<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Chat Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-off: #e91e83;
      --font-sm: 12px;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    /* ピン留めコメント */
    #pinned-chat {
      position: absolute;
      left: 20px;
      right: 520px;
      top: 756px;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 30px;
      font-weight: bold;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.3;
      display: none;
    }

    /* 接続ステータス */
    #status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #status-dot   { width: 8px; height: 8px; border-radius: 50%; }
    #status-label { font-size: var(--font-sm); }

    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: var(--color-off); box-shadow: 0 0 6px var(--color-off); }
    .label-on  { color: #22c55e; }
    .label-off { color: var(--color-off); }
  </style>
</head>
<body>
  <div id="app">
    <div id="pinned-chat"></div>
    <div id="status">
      <div id="status-dot" class="disconnected"></div>
      <span id="status-label" class="label-off">OFFLINE</span>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const COLORS = [
      "#CC0000", "#CC5500", "#AA7700", "#007700",
      "#007799", "#4400AA", "#880088"
    ];

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    const pinnedChat  = document.getElementById("pinned-chat");
    const statusDot   = document.getElementById("status-dot");
    const statusLabel = document.getElementById("status-label");

    let reconnectTimer = null;

    function setStatus(online, chatOn = false) {
      if (!online) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "OFFLINE";
      } else if (!chatOn) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "CHAT OFF";
      } else {
        statusDot.className     = "connected";
        statusLabel.className   = "label-on";
        statusLabel.textContent = "CONNECTED";
      }
    }

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true, false);
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);

          if (data.type === "timer") {
            setStatus(true, data.chat);
            return;
          }

          if (data.type === "chat_candidate") return;

          if (data.type === "pin_chat") {
            if (data.data) {
              const color = COLORS[data.data.color_index ?? 0];
              pinnedChat.style.color      = color;
              pinnedChat.style.background = hexToRgba(color, 0.2);
              pinnedChat.textContent      = `${data.data.author}: ${data.data.message}`;
              pinnedChat.style.display    = "block";
            } else {
              pinnedChat.style.display = "none";
            }
            return;
          }
        } catch (e) { console.warn(e); }
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
