<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Chat Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-off: #e91e83;
      --font-sm: 12px;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    /* ピン留めコメント */
    #pinned-chat {
      position: absolute;
      left: 20px;
      right: 520px;
      bottom: 85px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 30px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.3;
      display: none;
    }

    /* 接続ステータス */
    #status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #status-dot   { width: 8px; height: 8px; border-radius: 50%; }
    #status-label { font-size: var(--font-sm); }

    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: var(--color-off); box-shadow: 0 0 6px var(--color-off); }
    .label-on  { color: #22c55e; }
    .label-off { color: var(--color-off); }
  </style>
</head>
<body>
  <div id="app">
    <div id="pinned-chat"></div>
    <div id="status">
      <div id="status-dot" class="disconnected"></div>
      <span id="status-label" class="label-off">OFFLINE</span>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const pinnedChat  = document.getElementById("pinned-chat");
    const statusDot   = document.getElementById("status-dot");
    const statusLabel = document.getElementById("status-label");

    let reconnectTimer = null;

    function setStatus(online, chatOn = false) {
      if (!online) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "OFFLINE";
      } else if (!chatOn) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "CHAT OFF";
      } else {
        statusDot.className     = "connected";
        statusLabel.className   = "label-on";
        statusLabel.textContent = "CONNECTED";
      }
    }

    function isDark(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 < 128;
    }

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true, false);
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);

          if (data.type === "timer") {
            setStatus(true, data.chat);
            return;
          }

          if (data.type === "chat_candidate") return;

          if (data.type === "pin_chat") {
            if (data.data) {
              const { author, message, bg_color, superchat } = data.data;
              pinnedChat.replaceChildren();
              if (superchat) {
                // YouTube スタイル: ヘッダー（著者＋金額）＋ボディ（メッセージ）
                const textColor = isDark(bg_color) ? "#fff" : "#000";
                pinnedChat.style.padding    = "0";
                pinnedChat.style.overflow   = "hidden";
                pinnedChat.style.background = "transparent";
                pinnedChat.style.border     = "none";
                pinnedChat.style.color      = "";

                const header = document.createElement("div");
                header.style.cssText = `background:${bg_color};padding:8px 14px;display:flex;justify-content:space-between;align-items:center;`;
                const authorEl = document.createElement("span");
                authorEl.style.cssText = `font-weight:bold;color:${textColor};`;
                authorEl.textContent = author;
                const badge = document.createElement("span");
                badge.style.cssText = `font-weight:bold;color:${textColor};`;
                badge.textContent = superchat.currency + superchat.amount;
                header.appendChild(authorEl);
                header.appendChild(badge);
                pinnedChat.appendChild(header);

                if (message) {
                  const body = document.createElement("div");
                  body.style.cssText = `background:${bg_color};padding:8px 14px;color:${textColor};`;
                  body.textContent = message;
                  pinnedChat.appendChild(body);
                }
              } else {
                pinnedChat.style.padding    = "7px 10px";
                pinnedChat.style.overflow   = "";
                pinnedChat.style.background = "rgba(255,255,255,0.95)";
                pinnedChat.style.border     = `1px solid ${bg_color}`;
                pinnedChat.style.color      = "#111827";
                const authorEl = document.createElement("span");
                authorEl.style.cssText = `font-weight:bold;color:${bg_color};`;
                authorEl.textContent = author + ":";
                pinnedChat.appendChild(authorEl);
                pinnedChat.appendChild(document.createTextNode(" " + message));
              }
              // bottom: >180文字 → 5px(y=1075), ≤180 → 85px(y=995)
              //   最悪ケース上端: SC 139-180文字 → y=768px（配信エリア上限 y=750 内に収まる）
              // right: >260文字 → 20px(幅1880px), ≤260 → 520px(幅1380px)
              //   通常コメント全ケース上端 ≥ 825px ✓ / SC全ケース上端 ≥ 768px ✓
              pinnedChat.style.bottom  = message.length > 180 ? "5px"   : "85px";
              pinnedChat.style.right   = message.length > 260 ? "20px"  : "520px";
              pinnedChat.style.display = "block";
            } else {
              pinnedChat.style.display = "none";
            }
            return;
          }
        } catch (e) { console.warn(e); }
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
