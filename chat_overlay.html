<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Chat Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-off: #e91e83;
      --font-sm: 11px;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    /* ニコニコ 3 レーン（y=810〜y=1030） */
    #lanes {
      position: absolute;
      left: 0;
      right: 0;
      top: 810px;
      height: 220px;
    }

    .lane {
      position: absolute;
      left: 0;
      right: 0;
      height: 73px;
      overflow: hidden;
    }

    .lane:nth-child(1) { top: 0px; }
    .lane:nth-child(2) { top: 74px; }
    .lane:nth-child(3) { top: 148px; }

    /* スクロールするコメントバブル */
    .bubble {
      position: absolute;
      top: 50%;
      white-space: nowrap;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
    }

    @keyframes scroll-left {
      from { transform: translateY(-50%) translateX(1920px); }
      to   { transform: translateY(-50%) translateX(-100%); }
    }

    /* テロップ枠（将来実装・スペースのみ確保） */
    #ticker-area {
      position: absolute;
      left: 0;
      right: 0;
      top: 1030px;
      height: 30px;
    }

    /* スパチャオーバーレイ */
    #superchat-overlay {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 810px;
      height: 250px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #superchat-card {
      padding: 16px 28px;
      border-radius: 16px;
      min-width: 400px;
      max-width: 820px;
      text-align: center;
      animation: sc-in 0.3s ease-out;
    }

    @keyframes sc-in {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .sc-amount  { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
    .sc-author  { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
    .sc-message { font-size: 20px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }

    /* 接続ステータス */
    #status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #status-dot   { width: 8px; height: 8px; border-radius: 50%; }
    #status-label { font-size: var(--font-sm); }

    .connected    { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .disconnected { background: var(--color-off); box-shadow: 0 0 6px var(--color-off); }
    .label-on  { color: #22c55e; }
    .label-off { color: var(--color-off); }
  </style>
</head>
<body>
  <div id="app">
    <div id="lanes">
      <div class="lane"></div>
      <div class="lane"></div>
      <div class="lane"></div>
    </div>
    <div id="ticker-area"></div>
    <div id="superchat-overlay">
      <div id="superchat-card"></div>
    </div>
    <div id="status">
      <div id="status-dot" class="disconnected"></div>
      <span id="status-label" class="label-off">OFFLINE</span>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const COLORS = [
      "#CC0000", "#CC5500", "#AA7700", "#007700",
      "#007799", "#4400AA", "#880088"
    ];

    const THANKS_COLOR = "#002366";
    const SPEED = 300; // px/秒

    const SC_TIERS = [
      { max:      199, bg: "#1565C0", fg: "#ffffff" },
      { max:      499, bg: "#00BCD4", fg: "#000000" },
      { max:      999, bg: "#1DE9B6", fg: "#000000" },
      { max:     1999, bg: "#FFCA28", fg: "#000000" },
      { max:     4999, bg: "#F57C00", fg: "#ffffff" },
      { max:    49999, bg: "#E91E63", fg: "#ffffff" },
      { max: Infinity, bg: "#E53935", fg: "#ffffff" },
    ];

    function scTier(amount) {
      return SC_TIERS.find(t => amount <= t.max) || SC_TIERS[SC_TIERS.length - 1];
    }

    function scDuration(amount) {
      if (amount >= 5000) return 10000;
      if (amount >= 1000) return 7000;
      return 5000;
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    const lanes         = Array.from(document.querySelectorAll(".lane"));
    const scOverlay     = document.getElementById("superchat-overlay");
    const scCard        = document.getElementById("superchat-card");
    const statusDot     = document.getElementById("status-dot");
    const statusLabel   = document.getElementById("status-label");

    const laneAvailable = [true, true, true];
    const messageQueue  = [];
    const scQueue       = [];
    let scBusy          = false;
    let reconnectTimer  = null;

    function setStatus(online, chatOn = false) {
      if (!online) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "OFFLINE";
      } else if (!chatOn) {
        statusDot.className     = "disconnected";
        statusLabel.className   = "label-off";
        statusLabel.textContent = "CHAT OFF";
      } else {
        statusDot.className     = "connected";
        statusLabel.className   = "label-on";
        statusLabel.textContent = "CONNECTED";
      }
    }

    function pauseLanes() {
      document.querySelectorAll(".bubble").forEach(b => {
        b.style.animationPlayState = "paused";
      });
    }

    function resumeLanes() {
      document.querySelectorAll(".bubble").forEach(b => {
        b.style.animationPlayState = "running";
      });
    }

    function addBubble(laneIndex, text, color) {
      laneAvailable[laneIndex] = false;
      const lane   = lanes[laneIndex];
      const bubble = document.createElement("div");
      bubble.className        = "bubble";
      bubble.textContent      = text;
      bubble.style.color      = color;
      bubble.style.background = hexToRgba(color, 0.15);

      const approxWidth      = text.length * 17;
      const duration         = (1920 + approxWidth) / SPEED;
      bubble.style.animation = `scroll-left ${duration}s linear forwards`;

      bubble.addEventListener("animationend", () => {
        lane.removeChild(bubble);
        laneAvailable[laneIndex] = true;
        tryAssign();
      });

      lane.appendChild(bubble);
    }

    function tryAssign() {
      if (scBusy || messageQueue.length === 0) return;
      const idx = laneAvailable.findIndex(v => v);
      if (idx === -1) return;
      const msg = messageQueue.shift();
      addBubble(idx, msg.text, msg.color);
    }

    function enqueue(text, color) {
      messageQueue.push({ text, color });
      tryAssign();
    }

    function showScCard(sc) {
      scBusy = true;
      pauseLanes();

      const { bg, fg } = scTier(sc.amount);
      const duration   = scDuration(sc.amount);

      scCard.style.background = bg;
      scCard.innerHTML =
        `<div class="sc-amount" style="color:${fg}">${escapeHtml(sc.currency)}${sc.amount}</div>` +
        `<div class="sc-author"  style="color:${fg}">${escapeHtml(sc.author)}</div>` +
        (sc.message ? `<div class="sc-message" style="color:${fg}">${escapeHtml(sc.message)}</div>` : "");

      scOverlay.style.display = "flex";

      setTimeout(() => {
        scOverlay.style.display = "none";
        scBusy = false;
        resumeLanes();

        // 感謝メッセージを空きレーンへ
        enqueue(`${sc.author}さんありがとう。by国井精一`, THANKS_COLOR);

        if (scQueue.length > 0) {
          showScCard(scQueue.shift());
        }
      }, duration);
    }

    function connect() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true, false);
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);

          if (data.type === "timer") {
            setStatus(true, data.chat);
            return;
          }

          if (!data.author) return;

          const color = COLORS[data.color_index ?? 0];

          if (data.superchat) {
            const sc = {
              author:   data.author,
              message:  data.message,
              amount:   data.superchat.amount,
              currency: data.superchat.currency,
            };
            if (scBusy) {
              scQueue.push(sc);
            } else {
              showScCard(sc);
            }
          } else {
            enqueue(`${data.author}: ${data.message}`, color);
          }
        } catch (e) { console.warn(e); }
      };

      ws.onclose = () => {
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
