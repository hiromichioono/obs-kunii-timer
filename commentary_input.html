<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>解説入力</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:    #e91e83;
      --navy:    #002366;
      --green:   #4ade80;
      --bg:      #f0f4ff;
      --surface: #e2eaff;
      --border:  #b8c8e8;
    }

    body {
      background: var(--bg);
      color: #111827;
      font-family: sans-serif;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--pink);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* 接続ステータス */
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    #status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .disconnected { background: var(--pink);  box-shadow: 0 0 6px var(--pink); }
    .label-on  { color: var(--green); }
    .label-off { color: var(--pink); }

    /* 入力セクション */
    .section {
      background: var(--surface);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section label {
      font-size: 12px;
      color: #556;
      letter-spacing: 0.05em;
    }

    .section input,
    .section textarea {
      width: 100%;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #111827;
      font-size: 15px;
      font-family: sans-serif;
      resize: vertical;
    }

    .section textarea { min-height: 72px; }

    .btn-send {
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--navy);
      color: #8899cc;
      background: var(--surface);
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .btn-send:active { background: var(--navy); color: #fff; }

    .btn-send.sent-flash {
      border-color: var(--green);
      color: var(--green);
    }

    /* コメントピックアップ */
    #pickup-section {
      background: var(--surface);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    #pickup-section label {
      display: block;
      font-size: 12px;
      color: #556;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    #pickup-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pickup-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
    }


    .pickup-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-all;
      color: #111827;
    }

    .pickup-text .pickup-author {
      font-weight: bold;
      margin-right: 4px;
    }

    .btn-pick {
      flex-shrink: 0;
      min-width: 56px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 2px solid var(--navy);
      color: var(--navy);
      background: transparent;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-pick:active { opacity: 0.7; }

    .btn-pick.active {
      background: var(--navy);
      color: #fff;
    }

    #pickup-empty {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <h1>解説入力</h1>

  <div id="status">
    <div id="status-dot" class="disconnected"></div>
    <span id="status-label" class="label-off">OFFLINE</span>
  </div>

  <div class="section">
    <label>スコア予想</label>
    <input id="input-score" type="text" placeholder="例: 日本 2-1 スペイン" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    <button class="btn-send" data-field="score">送信</button>
  </div>

  <div class="section">
    <label>試合展開の予想</label>
    <textarea id="input-flow" placeholder="例: 前半は守備的に構え、後半カウンターで勝負をかける展開。" autocorrect="off" autocapitalize="none" spellcheck="false"></textarea>
    <button class="btn-send" data-field="flow">送信</button>
  </div>

  <div class="section">
    <label>注目選手と見どころ</label>
    <textarea id="input-player" placeholder="例: 久保建英 — ドリブル突破に注目。相手DFとの1対1が鍵になる。" autocorrect="off" autocapitalize="none" spellcheck="false"></textarea>
    <button class="btn-send" data-field="player">送信</button>
  </div>

  <div class="section">
    <label>専門用語の解説</label>
    <textarea id="input-term" placeholder="例: プレス：相手ボール保持者に素早く寄せ、パスコースを限定する守備戦術。" autocorrect="off" autocapitalize="none" spellcheck="false"></textarea>
    <button class="btn-send" data-field="term">送信</button>
  </div>

  <div id="pickup-section">
    <label>コメントピックアップ</label>
    <div id="pickup-list">
      <div id="pickup-empty">コメント待機中…</div>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.hostname || "localhost"}:8765`;

    const statusDot   = document.getElementById("status-dot");
    const statusLabel = document.getElementById("status-label");

    let ws             = null;
    let reconnectTimer = null;

    function setStatus(online) {
      statusDot.className     = online ? "connected"   : "disconnected";
      statusLabel.className   = online ? "label-on"    : "label-off";
      statusLabel.textContent = online ? "CONNECTED"   : "OFFLINE";
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    const pickupList  = document.getElementById("pickup-list");
    const pickupEmpty = document.getElementById("pickup-empty");

    let pinnedKey = null;
    let pinnedBtn = null;
    const btnByKey = new Map(); // key → button element（ws 受信時の逆引き用）

    function setActiveBtn(btn) {
      if (pinnedBtn) {
        pinnedBtn.classList.remove("active");
        pinnedBtn.textContent = "表示";
      }
      pinnedBtn = btn;
      if (btn) {
        btn.classList.add("active");
        btn.textContent = "表示中";
      }
    }

    // --- 通常チャット ---
    const COLORS = [
      "#00E676", "#C6FF00", "#AA00FF", "#FF7043",
      "#40C4FF", "#FF80AB", "#64FFDA"
    ];

    // --- スーパーチャット ---
    const SC_TIERS = [
      [10000, "#d00000"],  // 赤
      [ 5000, "#C2185B"],  // マゼンタ
      [ 2000, "#E65100"],  // 橙
      [ 1000, "#FFD600"],  // 黄
      [  500, "#00BFA5"],  // 黄緑
      [  200, "#00BCD4"],  // 水色
      [  100, "#1565C0"],  // 青
    ];
    const SC_MAX_LEN = [
      [10000, 350],
      [ 5000, 350],
      [ 2000, 350],
      [ 1000, 350],
      [  500, 350],
      [  200, 350],
      [  100,   0],
    ];
    function isDark(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 < 128;
    }
    function scColor(amount) {
      for (const [thresh, color] of SC_TIERS) {
        if (amount >= thresh) return color;
      }
      return SC_TIERS[SC_TIERS.length - 1][1];
    }
    function scMaxLen(amount) {
      for (const [thresh, len] of SC_MAX_LEN) {
        if (amount >= thresh) return len;
      }
      return 0;
    }

    function addCandidate(data) {
      if (pickupEmpty.parentNode) pickupEmpty.remove();

      const key  = data.author + ":" + data.datetime;
      const item = document.createElement("div");
      const text   = document.createElement("div");
      text.className = "pickup-text";
      const author = document.createElement("span");
      author.className = "pickup-author";
      author.textContent = data.author + ":";
      text.appendChild(author);

      if (data.superchat) {
        // --- スーパーチャット ---
        const c   = scColor(data.superchat.amount);
        const t   = isDark(c) ? "#fff" : "#000";
        const max = scMaxLen(data.superchat.amount);
        const msg = max > 0 ? (data.message || "").slice(0, max) : "";
        if (msg) text.appendChild(document.createTextNode(" " + msg));
        item.className        = "pickup-item sc";
        item.style.background = c;
        item.style.borderColor = c;
        item.style.color      = t;
        text.style.color      = t;
        author.style.color    = t;
        const badge = document.createElement("span");
        badge.style.cssText = `margin-left:4px;font-size:12px;color:${t};font-weight:bold;`;
        badge.textContent = data.superchat.currency + data.superchat.amount;
        text.appendChild(badge);
      } else {
        // --- 通常チャット ---
        item.className     = "pickup-item";
        author.style.color = COLORS[data.color_index ?? 0];
        text.appendChild(document.createTextNode(" " + (data.message || "")));
      }

      const btn = document.createElement("button");
      btn.className = "btn-pick";
      btn.textContent = "表示";
      btnByKey.set(key, btn);

      btn.onclick = () => {
        if (pinnedKey === key) {
          // 同じコメントを再タップ → OFF
          send({ type: "cmd", action: "pin_chat", data: null });
          pinnedKey = null;
          setActiveBtn(null);
        } else {
          // 別のコメントをタップ → ON（前の active は setActiveBtn 内で解除）
          const bg_color = data.superchat
            ? scColor(data.superchat.amount)
            : COLORS[data.color_index ?? 0];
          const message = data.superchat
            ? (data.message || "").slice(0, scMaxLen(data.superchat.amount))
            : (data.message || "").slice(0, 200);
          send({ type: "cmd", action: "pin_chat", data: {
            key, author: data.author, message, color_index: data.color_index, bg_color,
            ...(data.superchat ? { superchat: data.superchat } : {}),
          }});
          pinnedKey = key;
          setActiveBtn(btn);
        }
      };

      item.appendChild(text);
      item.appendChild(btn);
      pickupList.insertBefore(item, pickupList.firstChild);
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen  = () => { setStatus(true); clearTimeout(reconnectTimer); };
      ws.onclose = () => { setStatus(false); reconnectTimer = setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === "chat_candidate") {
            addCandidate(data);
          } else if (data.type === "pin_chat") {
            // 他クライアントや再接続後の状態同期
            const key = data.data?.key ?? null;
            pinnedKey = key;
            setActiveBtn(key ? (btnByKey.get(key) ?? null) : null);
          }
        } catch (_) {}
      };
    }

    document.querySelectorAll(".btn-send").forEach(btn => {
      btn.onclick = () => {
        const field = btn.dataset.field;
        const input = document.getElementById(`input-${field}`);
        send({ type: "cmd", action: "set_commentary", field, value: input.value });
        btn.classList.add("sent-flash");
        setTimeout(() => btn.classList.remove("sent-flash"), 600);
      };
    });

    connect();
  </script>
</body>
</html>
